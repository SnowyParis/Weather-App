<DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
        <link rel="stylesheet" href="font-awesome/css/all.min.css">
        <link rel="stylesheet" href="styles.css">
        <title>Weather App</title>
    </head>

    <body>
        
        <div class="main-container">
            <header class="input-container">
                <input class="city-input" type="text" placeholder="Enter a city name" spellcheck="false" />
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </header>

            <section class="weather-info">
                <div class="location-date-container">
                    <div class="location">
                        <i class="fas fa-location-dot"></i>
                    
                        <h4 class="city-text">South Africa</h4>
                    </div>

                    <h5 class="current-date text">Thu, 09 May</h5>
                </div>

                <div class="weather-summary-container">
                    <!-- <img src="images/HappyColor_51570.png" class="weather-summary-img" /> -->
                    <i class="fa-solid fa-cloud-sun"></i>

                    <div class="weather-summary-info">
                        <h1 class="temperature">20 °C</h1>
                        <h3 class="condition text">Cloudy</h3>
                    </div>
                </div>

                <div class="weather-conditions-container">
                    <div class="condition-item">
                        <i class="fa-solid fa-droplet"></i>

                        <div class="condition-info">
                            <h5 class="text">Humidity</h5>
                            <h5 class="humidity-value">30%</h5>
                        </div>
                    </div>
                    
                    <div class="condition-item">
                        <i class="fa-solid fa-wind"></i>

                        <div class="condition-info">
                            <h5 class="text">Wind Speed</h5>
                            <h5 class="wind-speed-value">10 km/h</h5>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </body>
</html>
